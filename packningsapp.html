<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packningsapp</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js"></script>
<style>
:root{--bg:#f7f6f3;--surface:#fff;--surface2:#f2f1ed;--border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);--text:#1a1a18;--text2:#6b6a65;--text3:#a09f99;--accent:#1a1a18;--accent-fg:#fff;--green-bg:#eaf3de;--green-fg:#3b6d11;--amber-bg:#faeeda;--amber-fg:#854f0b;--blue-bg:#e6f1fb;--blue-fg:#185fa5;--red-bg:#fcebeb;--red-fg:#a32d2d;--radius:10px;--radius-sm:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.auth-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:2.5rem;max-width:380px;width:100%;text-align:center}
.auth-logo{width:48px;height:48px;background:var(--accent);border-radius:var(--radius-sm);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1.25rem}
.auth-logo svg{width:24px;height:24px;fill:white}
.auth-card h1{font-size:20px;font-weight:600;margin-bottom:6px}
.auth-card p{color:var(--text2);font-size:13px;margin-bottom:1.5rem;line-height:1.5}
#auth-error{color:var(--red-fg);font-size:13px;margin-top:12px;background:var(--red-bg);padding:8px 12px;border-radius:var(--radius-sm);display:none}
#app{display:none}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center}
.topbar-logo svg{width:14px;height:14px;fill:white}
.topbar h1{font-size:15px;font-weight:600}
.role-tabs{display:flex;gap:2px;background:var(--surface2);padding:3px;border-radius:var(--radius-sm);border:1px solid var(--border)}
.role-tab{padding:4px 14px;font-size:13px;border-radius:4px;border:none;background:none;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s}
.role-tab.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.topbar-right{display:flex;align-items:center;gap:8px}
#user-name{font-size:12px;color:var(--text2)}
.main{max-width:960px;margin:0 auto;padding:1.5rem}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;font-size:13px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;transition:background .12s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
.btn-primary:hover{opacity:.88;background:var(--accent)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{color:var(--red-fg);border-color:var(--red-bg)}
.btn-danger:hover{background:var(--red-bg)}
.btn-ms{background:#0078d4;color:white;border-color:#0078d4;font-size:14px;padding:10px 20px;border-radius:var(--radius-sm);width:100%}
.btn-ms:hover{background:#006cbd}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px}
.section-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-bar span{font-size:13px;color:var(--text2)}
.order-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.order-row:last-child{border-bottom:none}
.order-row:hover{background:var(--surface2)}
.order-num{font-weight:600;font-size:14px;min-width:100px}
.order-customer{flex:1;color:var(--text2);font-size:13px}
.order-meta{font-size:12px;color:var(--text3)}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.badge-packing{background:var(--amber-bg);color:var(--amber-fg)}
.badge-done{background:var(--green-bg);color:var(--green-fg)}
.badge-shipped{background:var(--blue-bg);color:var(--blue-fg)}
.badge-partial{background:#f0e6fb;color:#6b21a8}
.pack-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.pack-toolbar-left{display:flex;align-items:center;gap:8px}
.pack-title{font-size:15px;font-weight:600}
.columns{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;height:calc(100vh - 180px)}
@media(max-width:600px){.columns{grid-template-columns:1fr}}
.col-label{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.article-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:5px;background:var(--surface);cursor:grab;user-select:none;transition:box-shadow .1s,background .1s}
.article-item:hover{background:var(--surface2)}
.article-item.dragging{opacity:.35}
.drag-handle{color:var(--text3);font-size:12px;cursor:grab;flex-shrink:0}
.ai-name{flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-qty{font-size:12px;color:var(--text2);white-space:nowrap}
.ai-loc{font-size:11px;color:var(--text2);background:var(--surface2);border-radius:4px;padding:1px 6px;white-space:nowrap;border:1px solid var(--border)}
.art-actions{display:flex;align-items:center;gap:2px;flex-shrink:0}
.art-btn{border:none;background:none;cursor:pointer;font-size:13px;padding:3px 5px;border-radius:4px;line-height:1}
.art-btn:hover{background:var(--surface2)}
.articles-empty{font-size:13px;color:var(--text3);text-align:center;padding:16px 0}
.article-modified{border-color:#f5a623!important;background:#fff8e6!important}
.article-modified:hover{background:#fff0cc!important}
.kolli-wrap{margin-bottom:8px}
.kolli-head{padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-bottom:none;border-radius:var(--radius-sm) var(--radius-sm) 0 0;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500}
.kolli-count{font-size:11px;color:var(--text3);flex:1}
.kolli-body{padding:8px;border:1px solid var(--border);min-height:54px;transition:background .1s}
.kolli-body.drag-target{background:var(--blue-bg);border-color:#aac8e8}
.kolli-meta{display:flex;gap:6px;padding:6px 10px;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);background:var(--surface2);flex-wrap:wrap;align-items:center}
.kolli-meta label{font-size:11px;color:var(--text2);white-space:nowrap}
.kolli-meta input{padding:3px 6px;border:1px solid var(--border2);border-radius:4px;font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);min-width:0}
.kolli-empty{font-size:12px;color:var(--text3);text-align:center;padding:12px 0}
.kolli-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:4px;font-size:12px;background:var(--surface);cursor:grab}
.ki-name{flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ki-qty{color:var(--text2)}
.ki-back{color:var(--text3);cursor:pointer;font-size:13px;border:none;background:none;line-height:1;padding:0 2px}
.ki-back:hover{color:var(--text)}
.add-kolli-btn{width:100%;padding:8px;font-size:13px;border-radius:var(--radius-sm);border:1.5px dashed var(--border2);background:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;transition:all .12s;margin-top:6px}
.add-kolli-btn:hover{background:var(--surface2);color:var(--text)}
.add-article-btn{width:100%;padding:7px;font-size:13px;border-radius:var(--radius-sm);border:1.5px dashed var(--border2);background:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;transition:all .12s;margin-top:4px}
.add-article-btn:hover{background:var(--surface2);color:var(--text)}
.frakt-kolli-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
@media print{.frakt-kolli-card{page-break-after:always}}
.frakt-kolli-header{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:500}
.frakt-table{width:100%;border-collapse:collapse;font-size:13px}
.frakt-table td{padding:7px 14px;border-bottom:1px solid var(--border)}
.frakt-table tr:last-child td{border-bottom:none}
.form-row{display:flex;gap:8px;margin-bottom:12px}
.form-row input{flex:1;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-family:inherit;font-size:13px;background:var(--surface);color:var(--text)}
.form-row input:focus{outline:none;border-color:var(--accent)}
.drop-zone{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:2rem;text-align:center;cursor:pointer;background:var(--surface2);transition:all .15s}
.drop-zone:hover,.drop-zone.drag-over{background:var(--blue-bg);border-color:#aac8e8}
.dz-icon{font-size:28px;margin-bottom:8px;display:block}
.loading-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2);padding:12px 0}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{font-size:13px;color:var(--red-fg);padding:8px 12px;background:var(--red-bg);border-radius:var(--radius-sm);margin-top:8px}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--text2);font-size:14px}
.es-icon{font-size:2rem;display:block;margin-bottom:8px}
.warn-card{background:#fffbf0;border:1px solid #f5d76a;border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;font-size:13px;color:var(--amber-fg)}
.save-status{font-size:12px;color:var(--text3);margin-bottom:6px;min-height:18px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border-radius:var(--radius);padding:1.5rem;width:420px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1rem}
.modal-field{margin-bottom:10px}
.modal-field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.modal-field input,.modal-field select{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-family:inherit;font-size:13px;background:var(--surface);color:var(--text)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
@media print{body{background:white}#app>.topbar,.pack-toolbar,.btn,.role-tabs,.topbar-right{display:none!important}.main{padding:0;max-width:100%}.frakt-kolli-card{page-break-inside:avoid;border:1px solid #ccc}.no-print{display:none!important}.print-header{margin-bottom:16px}.print-header h2{font-size:18px;font-weight:700}.print-header p{font-size:13px;color:#666;margin-top:4px}}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo"><svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2zm-9 9H7v-2h4v2zm6-4H7v-2h10v2z"/></svg></div>
    <h1>Packningsapp</h1>
    <p>Logga in med ditt Scanacon-konto.</p>
    <button class="btn btn-ms" onclick="signIn()">
      <svg viewBox="0 0 21 21" fill="none" width="18" height="18"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      Logga in med Microsoft
    </button>
    <div id="auth-error"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo"><svg viewBox="0 0 24 24" fill="white"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2zm-9 9H7v-2h4v2zm6-4H7v-2h10v2z"/></svg></div>
      <h1>Packningsapp</h1>
    </div>
    <div class="role-tabs">
      <button class="role-tab active" id="tab-packare" onclick="setRole('packare')">&#128230; Packare</button>
      <button class="role-tab" id="tab-frakt" onclick="setRole('frakt')">&#128666; Frakt</button>
    </div>
    <div class="topbar-right">
      <span id="user-name"></span>
      <button class="btn btn-sm" onclick="signOut()">Logga ut</button>
    </div>
  </div>

  <div class="main">
    <div id="view-packare">
      <div id="packare-list-view">
        <div class="section-bar">
          <span>Aktiva ordrar</span>
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm" onclick="loadPackareList()">&#8635; Uppdatera</button>
            <button class="btn btn-sm btn-primary" onclick="showNewOrder()">+ Ny order</button>
          </div>
        </div>
        <div class="card"><div id="packare-orders-list"><div class="loading-row" style="padding:1rem"><div class="spinner"></div><span>Laddar...</span></div></div></div>
      </div>

      <div id="packare-new-view" style="display:none">
        <div class="pack-toolbar">
          <div class="pack-toolbar-left">
            <button class="btn btn-sm" onclick="showPackareList()">&larr; Tillbaka</button>
            <span class="pack-title">Ny plocklista</span>
          </div>
        </div>
        <div class="form-row">
          <input type="text" id="order-num-input" placeholder="Ordernummer, t.ex. SO-1042">
          <input type="text" id="customer-input" placeholder="Kundnamn (valfritt)">
        </div>
        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
          <span class="dz-icon">&#128202;</span>
          <p><strong>Dra in plocklista (Excel)</strong> eller klicka f&ouml;r att v&auml;lja</p>
          <p style="font-size:12px;margin-top:4px">Exportera fr&aring;n BC som Excel och dra in h&auml;r</p>
        </div>
        <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none">
        <div id="new-order-error"></div>
        <div id="new-order-loading" style="display:none"><div class="loading-row"><div class="spinner"></div><span id="loading-txt">L&auml;ser...</span></div></div>
      </div>

      <div id="packare-pack-view" style="display:none">
        <div class="pack-toolbar">
          <div class="pack-toolbar-left">
            <button class="btn btn-sm" onclick="showPackareList()">&larr; Tillbaka</button>
            <span class="pack-title" id="pack-order-label"></span>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-sm btn-danger" onclick="deleteCurrentOrder()">&#128465; Ta bort</button>
            <button class="btn btn-sm" onclick="saveCurrentOrder()">&#128190; Spara</button>
            <button class="btn btn-sm btn-primary" onclick="markDone()">&#10003; Markera klar</button>
          </div>
        </div>
        <div class="save-status" id="save-status"></div>
        <div class="columns">
          <div>
            <div class="col-label"><span>Artiklar att packa</span><span id="unpack-count"></span></div>
            <div id="pack-articles" style="height:calc(100vh - 240px);overflow-y:auto;padding-right:4px"></div>
          </div>
          <div>
            <div class="col-label">Kollin</div>
            <div id="pack-kollin" style="height:calc(100vh - 300px);overflow-y:auto;padding-right:4px"></div>
            <button class="add-kolli-btn" onclick="addKolliCurrent()">+ L&auml;gg till kolli</button>
            <button class="add-article-btn" id="add-art-btn">+ L&auml;gg till artikel / kartong</button>
            <button class="add-article-btn" id="add-excel-btn" style="margin-top:4px">+ L&auml;gg till fr&aring;n Excel</button>
            <input type="file" id="add-excel-input" accept=".xlsx,.xls" style="display:none">
          </div>
        </div>
      </div>
    </div>

    <div id="view-frakt" style="display:none">
      <div id="frakt-list-view">
        <div class="section-bar">
          <span>Klara f&ouml;r frakt</span>
          <button class="btn btn-sm" onclick="loadFraktList()">&#8635; Uppdatera</button>
        </div>
        <div class="card"><div id="frakt-orders-list"><div class="loading-row" style="padding:1rem"><div class="spinner"></div><span>Laddar...</span></div></div></div>
      </div>
      <div id="frakt-detail-view" style="display:none">
        <div class="pack-toolbar no-print">
          <div class="pack-toolbar-left">
            <button class="btn btn-sm" onclick="showFraktList()">&larr; Tillbaka</button>
            <span class="pack-title" id="frakt-order-label"></span>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm" onclick="reopenOrder()">&#8635; &Aring;ter&ouml;ppna</button>
            <button class="btn btn-sm btn-primary" onclick="window.print()">&#128424; Print packing list</button>

            <button class="btn btn-sm btn-danger" onclick="deleteFraktOrder()">&#128465; Ta bort</button>
          </div>
        </div>
        <div id="print-header" class="print-header" style="display:none"></div>
        <div id="frakt-kolli-view"></div>
      </div>
    </div>
  </div>
</div>

<script>
var SITE_URL = 'https://scanacon.sharepoint.com/sites/Operation';
var LIST_NAME = 'PackningsOrders';
var CLIENT_ID = '7d73fb47-d382-4a89-891a-58c13b01a47a';
var TENANT_ID = 'scanacon.onmicrosoft.com';

var KARTONGER = [
  {nr:'1401-0001',desc:'Syrakartong LQ9, 25x25x26 cm'},
  {nr:'1401-0002',desc:'Syrakartong LQ12, 38x26x29.5 cm'},
  {nr:'1401-0003',desc:'Kartong 20x18.5x12 cm'},
  {nr:'1401-0004',desc:'Kartong 32x22.5x25 cm'},
  {nr:'1401-0005',desc:'Kartong 120x80x80 cm'},
  {nr:'1401-0006',desc:'Kartong 80x60x70 cm'},
  {nr:'1401-0007',desc:'Kartong 57x39x20/30/39 cm'},
  {nr:'1401-0008',desc:'Kartong DG6 40x30x40 cm'},
  {nr:'1401-0009',desc:'Kartong 15.3x5.5x5.5 cm'},
  {nr:'1401-0010',desc:'Kartong 18x13.2x8.5 cm'},
  {nr:'1401-0011',desc:'Papper Pad-pak junior'},
  {nr:'1401-0012',desc:'Kartong 20x15x10 cm'},
  {nr:'1401-0013',desc:'Kartong 25x15x20/15 cm'},
  {nr:'1401-0014',desc:'Kartong 39x29x30/25 cm'},
  {nr:'1403-0001',desc:'Halvpall 80x60x14 cm'},
  {nr:'1403-0002',desc:'Helpall 120x80x10 cm'},
  {nr:'1403-0003',desc:'Pall filterkartong 165x54x12 cm'}
];

var msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: 'https://login.microsoftonline.com/' + TENANT_ID,
    redirectUri: window.location.origin + window.location.pathname
  },
  cache: {cacheLocation:'sessionStorage'}
};

var msalInstance;
var account = null;
var currentOrder = null;
var currentOrderId = null;
var siteId = null;
var listId = null;
var dragItem = null;
var saveTimeout = null;
var scopes = ['https://graph.microsoft.com/Sites.ReadWrite.All'];

function signIn() { msalInstance.loginRedirect({scopes: scopes}); }
function signOut() { msalInstance.logoutPopup(); }

async function getToken() {
  try {
    var resp = await msalInstance.acquireTokenSilent({scopes: scopes, account: account});
    return resp.accessToken;
  } catch(e) {
    var resp = await msalInstance.acquireTokenPopup({scopes: scopes});
    return resp.accessToken;
  }
}

async function graphRequest(method, path, body) {
  var token = await getToken();
  var opts = {method: method, headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'Accept': 'application/json'}};
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch('https://graph.microsoft.com/v1.0' + path, opts);
  if (!r.ok) { var err = await r.json().catch(function() { return {}; }); throw new Error(err.error ? err.error.message : r.statusText); }
  if (r.status === 204) return null;
  return r.json();
}

async function initApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-name').textContent = account.name || account.username;
  document.getElementById('add-art-btn').onclick = function() { openAddArtModal(); };
  initAddExcelBtn();
  try {
    var siteResp = await graphRequest('GET', '/sites/scanacon.sharepoint.com:/sites/Operation');
    siteId = siteResp.id;
    await ensureList();
  } catch(e) { console.warn('SP init error:', e.message); }
  loadPackareList();
}

async function ensureList() {
  try {
    var lists = await graphRequest('GET', '/sites/' + siteId + '/lists?$filter=displayName eq \'' + LIST_NAME + '\'');
    if (lists.value.length > 0) { listId = lists.value[0].id; }
    else {
      var created = await graphRequest('POST', '/sites/' + siteId + '/lists', {
        displayName: LIST_NAME,
        columns: [{name:'OrderNum',text:{}},{name:'Customer',text:{}},{name:'Status',text:{}},{name:'OrderData',text:{allowMultipleLines:true,maxLength:100000}}],
        list: {template:'genericList'}
      });
      listId = created.id;
    }
  } catch(e) { console.warn('ensureList error:', e.message); }
}

async function getAllOrders() {
  if (!siteId || !listId) return [];
  var resp = await graphRequest('GET', '/sites/' + siteId + '/lists/' + listId + '/items?$expand=fields&$top=200');
  return resp.value.map(function(item) {
    try { var data = JSON.parse(item.fields.OrderData || '{}'); data._spId = item.id; return data; } catch(e) { return null; }
  }).filter(Boolean).sort(function(a,b) { return b.createdAt - a.createdAt; });
}

async function saveOrderToSP(order) {
  if (!siteId || !listId) return order;
  var fields = {Title: order.orderNum, OrderNum: order.orderNum, Customer: order.customer || '', Status: order.status, OrderData: JSON.stringify(order)};
  if (order._spId) { await graphRequest('PATCH', '/sites/' + siteId + '/lists/' + listId + '/items/' + order._spId + '/fields', fields); }
  else { var created = await graphRequest('POST', '/sites/' + siteId + '/lists/' + listId + '/items', {fields: fields}); order._spId = created.id; }
  return order;
}

async function deleteOrderFromSP(spId) {
  if (!siteId || !listId) return;
  await graphRequest('DELETE', '/sites/' + siteId + '/lists/' + listId + '/items/' + spId);
}

function setRole(r) {
  document.getElementById('tab-packare').classList.toggle('active', r === 'packare');
  document.getElementById('tab-frakt').classList.toggle('active', r === 'frakt');
  document.getElementById('view-packare').style.display = r === 'packare' ? 'block' : 'none';
  document.getElementById('view-frakt').style.display = r === 'frakt' ? 'block' : 'none';
  if (r === 'packare') loadPackareList(); else loadFraktList();

async function loadPackareList() {
  var el = document.getElementById('packare-orders-list');
  el.innerHTML = '<div class="loading-row" style="padding:1rem"><div class="spinner"></div><span>Laddar...</span></div>';
  try {
    var orders = await getAllOrders();
    var active = orders.filter(function(o) { return o.status !== 'shipped'; });
    if (active.length === 0) { el.innerHTML = '<div class="empty-state"><span class="es-icon">&#128203;</span>Inga aktiva ordrar</div>'; return; }
    el.innerHTML = '';
    active.forEach(function(o) {
      var row = document.createElement('div'); row.className = 'order-row';
      var badge = o.status === 'done' ? 'badge-done' : 'badge-packing';

async function loadFraktList() {
  var el = document.getElementById('frakt-orders-list');

function confirmEditQty(aid, origQty) {
  var a = currentOrder.articles.find(function(x) { return x.id === aid; }); if (!a) return;

  var f4 = document.createElement('div'); f4.className = 'modal-field'; var l4 = document.createElement('label'); l4.textContent = 'Antal'; var inp4 = document.createElement('input'); inp4.type = 'text'; inp4.id = 'modal-qty'; inp4.value = '1 ST'; f4.appendChild(l4); f4.appendChild(inp4);
  var acts = document.createElement('div'); acts.className = 'modal-actions';
  var cancelBtn = document.createElement('button'); cancelBtn.className = 'btn btn-sm'; cancelBtn.textContent = 'Avbryt'; cancelBtn.onclick = function() { overlay.remove(); };
  var addBtn = document.createElement('button'); addBtn.className = 'btn btn-sm btn-primary'; addBtn.textContent = 'L\u00e4gg till';
  addBtn.onclick = function() {
    var nr = document.getElementById('modal-artnr').value.trim(); var desc = document.getElementById('modal-desc').value.trim(); var qty = document.getElementById('modal-qty').value.trim();
    if (!nr && !desc) { alert('Fyll i artikelnummer eller beskrivning.'); return; }
    currentOrder.articles.push({id:'a'+Date.now(), name:nr?(nr+(desc?' \u2013 '+desc:'')):desc, qty:qty||'1 ST', location:'', kolli:null, isModified:true});
    overlay.remove(); scheduleSave(); renderPackView();
  };
  acts.appendChild(cancelBtn); acts.appendChild(addBtn);
  modal.appendChild(h3); modal.appendChild(f1); modal.appendChild(f2); modal.appendChild(f3); modal.appendChild(f4); modal.appendChild(acts);
  overlay.appendChild(modal); document.body.appendChild(overlay);
}

function addKolliCurrent() { var n = currentOrder.kollin.length + 1; currentOrder.kollin.push({id:'k'+Date.now(), label:'Kolli '+n}); scheduleSave(); renderPackView(); }
function removeKolliOrder(kid) { currentOrder.articles.forEach(function(a) { if (a.kolli === kid) a.kolli = null; }); currentOrder.kollin = currentOrder.kollin.filter(function(k) { return k.id !== kid; }); currentOrder.kollin.forEach(function(k,i) { k.label = 'Kolli ' + (i+1); }); scheduleSave(); renderPackView(); }
function unpackItem(aid) { var a = currentOrder.articles.find(function(x) { return x.id === aid; }); if (a) { a.kolli = null; scheduleSave(); renderPackView(); } }

function scheduleSave() {
  clearTimeout(saveTimeout);
  document.getElementById('save-status').textContent = 'Sparar...';
  saveTimeout = setTimeout(async function() {
    try { await saveOrderToSP(currentOrder); document.getElementById('save-status').textContent = 'Sparat \u2713'; setTimeout(function() { document.getElementById('save-status').textContent = ''; }, 2000); }
    catch(e) { document.getElementById('save-status').textContent = '\u26a0\ufe0f Kunde inte spara: ' + e.message; }
  }, 800);
}

async function saveCurrentOrder() {
  try { document.getElementById('save-status').textContent = 'Sparar...'; await saveOrderToSP(currentOrder); document.getElementById('save-status').textContent = 'Sparat \u2713'; setTimeout(function() { document.getElementById('save-status').textContent = ''; }, 2000); }
  catch(e) { document.getElementById('save-status').textContent = '\u26a0\ufe0f ' + e.message; }
}
async function markDone() { currentOrder.status = 'done'; await saveOrderToSP(currentOrder); showPackareList(); }
async function markShipped() {
  currentOrder.kollin.forEach(function(k) { k.shipped = true; k.shippedAt = new Date().toLocaleDateString('sv-SE'); });
  currentOrder.status = 'shipped';
  await saveOrderToSP(currentOrder);
  showFraktList();
}
async function shipKolli(kid) {
  var k = currentOrder.kollin.find(function(x) { return x.id === kid; });
  if (!k) return;
  k.shipped = true;
  k.shippedAt = new Date().toLocaleDateString('sv-SE');
  // Check if all kollin are shipped
  var allShipped = currentOrder.kollin.every(function(x) { return x.shipped; });
  currentOrder.status = allShipped ? 'shipped' : 'partial';
  await saveOrderToSP(currentOrder);
  renderFraktView();
  // Refresh list badge in background
  loadFraktList();
}

async function deleteFraktOrder() {
  if (!confirm('Ta bort order ' + currentOrder.orderNum + '? Detta kan inte ångras.')) return;
  await deleteOrderFromSP(currentOrder._spId);
  showFraktList();
}

async function reopenOrder() {
  var o = currentOrder;
  o.status = 'packing';
  await saveOrderToSP(o);
  setRole('packare');
  document.getElementById('packare-list-view').style.display = 'none';
  document.getElementById('packare-new-view').style.display = 'none';
  document.getElementById('packare-pack-view').style.display = 'block';
  document.getElementById('pack-order-label').textContent = o.orderNum + (o.customer ? ' – ' + o.customer : '');
  currentOrder = o;
  renderPackView();
}
async function deleteCurrentOrder() { if (!confirm('Ta bort order ' + currentOrder.orderNum + '?')) return; await deleteOrderFromSP(currentOrder._spId); showPackareList(); }

var dz = document.getElementById('drop-zone');
var fi = document.getElementById('file-input');
dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', function() { dz.classList.remove('drag-over'); });
dz.addEventListener('drop', function(e) { e.preventDefault(); dz.classList.remove('drag-over'); var f = e.dataTransfer.files[0]; if (f && (f.name.endsWith('.xlsx') || f.name.endsWith('.xls'))) handleFile(f); else showNewOrderError('Bara Excel-filer st\u00f6ds.'); });
fi.addEventListener('change', function(e) { if (e.target.files[0]) handleFile(e.target.files[0]); });

async function handleFile(file) {
  var on = document.getElementById('order-num-input').value.trim();
  if (!on) { showNewOrderError('Fyll i ordernummer f\u00f6rst.'); return; }
  document.getElementById('new-order-error').innerHTML = '';
  document.getElementById('new-order-loading').style.display = 'block';
  dz.style.display = 'none';
  try {
    document.getElementById('loading-txt').textContent = 'L\u00e4ser Excel...';
    var articles = await parseExcel(file);
    var order = {id:'ord'+Date.now(), orderNum:on, customer:document.getElementById('customer-input').value.trim(), status:'packing', createdAt:Date.now(), articles:articles, kollin:[{id:'k0',label:'Kolli 1'}]};
    document.getElementById('loading-txt').textContent = 'Sparar...';
    try { await saveOrderToSP(order); } catch(e) { console.warn('SP save:', e.message); }
    currentOrder = order;
    document.getElementById('new-order-loading').style.display = 'none';
    document.getElementById('packare-new-view').style.display = 'none';
    document.getElementById('pack-order-label').textContent = order.orderNum + (order.customer ? ' \u2013 ' + order.customer : '');
    document.getElementById('packare-pack-view').style.display = 'block';
    renderPackView();
  } catch(e) { document.getElementById('new-order-loading').style.display = 'none'; dz.style.display = 'block'; showNewOrderError('Fel: ' + e.message); }
}

async function parseExcel(file) {
  var ab = await file.arrayBuffer();
  var wb = XLSX.read(ab, {type:'array'});
  var ws = wb.Sheets[wb.SheetNames[0]];
  var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  var articles = [];
  rows.forEach(function(row, idx) {
    if (String(row[0]).trim() !== 'Artikel') return;
    var artNr = String(row[1]||'').trim(); var desc = String(row[4]||'').trim(); var location = String(row[5]||'').trim(); var qty = String(row[16]||'').trim(); var unit = String(row[9]||'').trim();
    if (!artNr && !desc) return;
    articles.push({id:'a'+idx, name:artNr?(artNr+(desc?' \u2013 '+desc:'')):desc, qty:qty+(unit?' '+unit:''), location:location, kolli:null});
  });
  if (articles.length === 0) throw new Error('Inga artikelrader hittades. Kontrollera att det \u00e4r r\u00e4tt Excel-fil fr\u00e5n BC.');
  return articles;
}

function showNewOrderError(msg) { document.getElementById('new-order-error').innerHTML = '<div class="error-msg">' + msg + '</div>'; }
function showAuthError(msg) { var el = document.getElementById('auth-error'); el.textContent = msg; el.style.display = 'block'; }
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function initAddExcelBtn() {
  var btn = document.getElementById('add-excel-btn');
  var inp = document.getElementById('add-excel-input');
  if (!btn || !inp) return;
  btn.onclick = function() { inp.value = ''; inp.click(); };
  inp.onchange = function(e) { if (e.target.files[0]) handleAddExcel(e.target.files[0]); };
}

async function handleAddExcel(file) {
  try {
    var ab = await file.arrayBuffer();
    var wb = XLSX.read(ab, {type:'array'});
    var ws = wb.Sheets[wb.SheetNames[0]];
    var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    var added = 0;
    var updated = 0;

    // Build a map of existing articles by artikelnummer for fast lookup
    var existingMap = {};
    currentOrder.articles.forEach(function(a) {
      var nrMatch = a.name.match(/^([0-9]{4}-[0-9]{4})/);
      if (nrMatch) existingMap[nrMatch[1]] = a;
    });

    // First pass: count how many times each artikelnummer appears in Excel
    var artCount = {};
    rows.forEach(function(row) {
      var artNr = String(row[1]||'').trim();
      if (!/^[0-9]{4}-[0-9]{4}$/.test(artNr)) return;
      var typ = String(row[0]||'').trim();
      if (typ && typ !== 'Artikel') return;
      artCount[artNr] = (artCount[artNr] || 0) + 1;
    });

    // Second pass: process rows
    var seenArt = {};
    rows.forEach(function(row, idx) {
      var typ = String(row[0]||'').trim();
      var artNr = String(row[1]||'').trim();
      if (!artNr || artNr === 'Nr') return;
      if (typ && typ !== 'Artikel') return;
      if (!/^[0-9]{4}-[0-9]{4}$/.test(artNr)) return;

      var desc = String(row[4]||'').trim();
      var location = String(row[5]||'').trim();
      // Use column G (index 6) as the "total new quantity" - this reflects edits made in Excel
      // Column Q (index 16) = original "ant. att utleverera" which may not be updated
      var qtyRaw = String(row[16]||'').trim();
      var unit = String(row[9]||'').trim() || 'ST';
      var rowQty = parseInt(qtyRaw) || 0;
      if (rowQty === 0) return;

      var name = artNr + (desc ? ' – ' + desc : '');
      var isFirstOccurrence = !seenArt[artNr];
      seenArt[artNr] = true;
      var appearsMultiple = artCount[artNr] > 1;

      if (existingMap[artNr]) {
        var a = existingMap[artNr];
        var existingQty = parseInt(a.qty) || 0;
        var oldUnit = a.qty.replace(/[0-9]/g, '').trim() || unit;
        var addAmount = 0;

        if (appearsMultiple) {
          // Multiple rows: first row = original (skip), second row = tillagg
          if (isFirstOccurrence) return;
          addAmount = rowQty;
        } else {
          // Single row: diff = total new minus existing
          addAmount = rowQty - existingQty;
          if (addAmount <= 0) return;
        }

        // Add as a NEW row so packaren sees exactly what to add
        // Keep existing packed row untouched
        currentOrder.articles.push({
          id: 'a' + Date.now() + idx,
          name: name + ' (tillägg)',
          qty: addAmount + ' ' + oldUnit,
          location: a.location || location,
          kolli: null,
          isModified: true
        });
        updated++;
      } else {
        // New article – only add once (first occurrence)
        if (!isFirstOccurrence) return;
        currentOrder.articles.push({
          id: 'a' + Date.now() + idx,
          name: name,
          qty: rowQty + ' ' + unit,
          location: location,
          kolli: null,
          isModified: true
        });
        existingMap[artNr] = currentOrder.articles[currentOrder.articles.length - 1];
        added++;
      }
    });
    scheduleSave();
    renderPackView();
    alert('Klart! ' + added + ' nya artiklar tillagda, ' + updated + ' artiklar uppdaterade med nytt antal.');
  } catch(e) {
    alert('Fel vid inläsning: ' + e.message);
  }
}

async function startApp() {
  try {
    msalInstance = new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();
    var resp = await msalInstance.handleRedirectPromise();
    if (resp) { account = resp.account; initApp(); }
    else { var accounts = msalInstance.getAllAccounts(); if (accounts.length > 0) { account = accounts[0]; initApp(); } }
  } catch(e) { showAuthError('Kunde inte starta appen: ' + e.message); }
}
startApp();
